<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro</title>
    <link rel="stylesheet" href="style-login.css">
</head>
<body>
    <div class="contenedor">
        <div class="contenedor-form">
            <form class="sign-in">
                <h2>Iniciar sesión</h2>
                <div class="Redes-sociales">
                    <ion-icon name="logo-whatsapp"></ion-icon>
                </div>
                    <span>Use su correo y contraseña</span>
                    <div class="contenido-input">
                        <ion-icon name="mail-outline"></ion-icon>
                        <input type="email" id="loginCorreo" placeholder="Correo electrónico">
                    </div>
                    <div class="contenido-input">
                        <ion-icon name="lock-closed-outline"></ion-icon>
                        <input type="password" id="loginPassword" placeholder="Contraseña">
                    </div>
                    <a href="#">¿Olvidaste tu contraseña?</a>
                    <button type="button" class="button" id="btn-login">INICIAR SESIÓN</button>
            </form>
        </div>
        <div class="contenedor-form">
            <form class="sign-up">
                <h2>Registrarse</h2>
                <div class="Redes-sociales">
                    <ion-icon name="logo-whatsapp"></ion-icon>
                </div>
                    <span>Use su correo electrónico para registrarse</span>
                    <div class="contenido-input">
                        <ion-icon name="person-outline"></ion-icon>
                        <input type="text" id="registroNombre" placeholder="Nombre y Apellidos">
                    </div>
                    <div class="contenido-input">
                        <ion-icon name="mail-outline"></ion-icon>
                        <input type="email" id="registroCorreo" placeholder="Correo electrónico">
                    </div>
                    <div class="contenido-input">
                        <ion-icon name="lock-closed-outline"></ion-icon>
                        <input type="password" id="registroPassword" placeholder="Contraseña">
                    </div>
                    <button type="button" class="button" id="btn-registrar">REGISTRARSE</button>
            </form>
        </div>
       <div class="contenedor-welcome">
            <div class="welcome-sign-up welcome">
                <h3>¡Bienvenido!</h3>
                <p>Ingrese sus datos personales para usar todas las funciones del sitio</p>
                <button class="button" id="btn-sign-up">Registrarse</button>
            </div>
            <div class="welcome-sign-in welcome">
                <h3>¡Hola!</h3>
                <p>Registrese con sus datos personales para usar todas las funciones del sitio</p>
                <button class="button" id="btn-sign-in">Iniciar Sesión</button>
            </div>
       </div>
    </div>
    <script src="script.js"></script>
    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>
</body>
</html>
